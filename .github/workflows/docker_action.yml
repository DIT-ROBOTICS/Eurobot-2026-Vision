name: Build All Images & Push to Registry

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/dockerfiles/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'docker/dockerfiles/**'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      push:
        description: "Push to GHCR? (0 or 1)"
        required: true
        default: "0"
      platforms:
        description: "Platforms for build"
        required: true
        default: "linux/amd64,linux/arm64"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      ORG: ${{ github.repository_owner }}
      PLATFORMS: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: QEMU (multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- PR build ---
      - name: PR Test Build
        if: github.event_name == 'pull_request'
        run: make build LOAD=1 PLATFORMS=linux/amd64

      # --- Push main ---
      - name: Build & Push (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: make build PUSH=1

      # --- Manual build ---
      - name: Manual Build
        if: github.event_name == 'workflow_dispatch'
        run: |
          make build librealsense \
               PUSH=${{ github.event.inputs.push }} \
               PLATFORMS='${{ github.event.inputs.platforms }}'
